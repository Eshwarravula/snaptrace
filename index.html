var faceModelsLoaded=false;
var faceModelsLoading=false;
var faceModelError=null;

// Wait for face-api.js script to load (it's defer'd)
function waitForFaceApi(){
  if(window.faceapi)return Promise.resolve(true);
  return new Promise(function(resolve){
    var attempts=0;
    var check=setInterval(function(){
      attempts++;
      if(window.faceapi){clearInterval(check);resolve(true);return}
      if(attempts>50){clearInterval(check);console.error("SnapTrace: face-api.js library failed to load from CDN");resolve(false)}
    },200);
  });
}

function loadFaceModels(onProgress){
  if(faceModelsLoaded)return Promise.resolve(true);
  if(faceModelsLoading)return new Promise(function(resolve){
    var check=setInterval(function(){
      if(faceModelsLoaded){clearInterval(check);resolve(true)}
      if(faceModelError){clearInterval(check);resolve(false)}
    },300);
  });
  faceModelsLoading=true;
  faceModelError=null;
  if(onProgress)onProgress("Waiting for face-api.js library...");
  return waitForFaceApi().then(function(libOk){
    if(!libOk){
      faceModelError="Library not loaded";
      faceModelsLoading=false;
      return false;
    }
    console.log("SnapTrace: face-api.js library loaded, version:",faceapi.version||"unknown");
    if(onProgress)onProgress("Loading face detection model (190KB)...");
    return faceapi.nets.tinyFaceDetector.loadFromUri(FACE_MODEL_URL);
  }).then(function(r){
    if(r===false)return false;
    console.log("SnapTrace: TinyFaceDetector model loaded");
    if(onProgress)onProgress("Loading face landmark model (300KB)...");
    return faceapi.nets.faceLandmark68TinyNet.loadFromUri(FACE_MODEL_URL);
  }).then(function(r){
    if(r===false)return false;
    console.log("SnapTrace: FaceLandmark68Tiny model loaded");
    if(onProgress)onProgress("Loading face recognition model (6.2MB)...");
    return faceapi.nets.faceRecognitionNet.loadFromUri(FACE_MODEL_URL);
  }).then(function(r){
    if(r===false)return false;
    faceModelsLoaded=true;
    faceModelsLoading=false;
    console.log("SnapTrace: All face models loaded successfully!");
    return true;
  }).catch(function(err){
    console.error("SnapTrace: Failed to load face models:",err);
    faceModelError=err.message||String(err);
    faceModelsLoading=false;
    return false;
  });
}

function loadImage(src){
  return new Promise(function(resolve,reject){
    var img=new Image();
    // Only set crossOrigin for http URLs, not data URLs
    if(src.indexOf("data:")!==0){
      img.crossOrigin="anonymous";
    }
    img.onload=function(){
      console.log("SnapTrace: Image loaded, size:",img.naturalWidth,"x",img.naturalHeight);
      resolve(img);
    };
    img.onerror=function(){reject(new Error("Image load failed"))};
    img.src=src;
  });
}

function detectFacesInImage(imgEl){
  if(!faceModelsLoaded){console.warn("SnapTrace: Models not loaded, skipping detection");return Promise.resolve([]);}
  console.log("SnapTrace: Running face detection on",imgEl.naturalWidth,"x",imgEl.naturalHeight,"image...");
  var opts=new faceapi.TinyFaceDetectorOptions({inputSize:416,scoreThreshold:0.2});
  return faceapi.detectAllFaces(imgEl,opts)
    .withFaceLandmarks(true)
    .withFaceDescriptors()
    .then(function(detections){
      console.log("SnapTrace: Found "+detections.length+" face(s) with descriptors");
      return detections.map(function(d){
        return{
          descriptor:Array.from(d.descriptor),
          box:{x:d.detection.box.x,y:d.detection.box.y,w:d.detection.box.width,h:d.detection.box.height},
          score:d.detection.score
        };
      });
    }).catch(function(err){
      console.error("SnapTrace: Face detection error:",err);
      return[];
    });
}

function euclideanDist(a,b){
  var sum=0;
  for(var i=0;i<a.length;i++){var d=a[i]-b[i];sum+=d*d}
  return Math.sqrt(sum);
}

function matchFaces(selfieDescriptors,photoFaceData,threshold){
  if(!threshold)threshold=0.55;
  var results=[];
  photoFaceData.forEach(function(photo){
    if(!photo.faceData||photo.faceData.length===0)return;
    var bestDist=Infinity;
    selfieDescriptors.forEach(function(sd){
      photo.faceData.forEach(function(fd){
        var dist=euclideanDist(sd,fd.descriptor);
        if(dist<bestDist)bestDist=dist;
      });
    });
    if(bestDist<threshold){
      results.push({photo:photo,distance:bestDist,confidence:Math.round(Math.max(0,Math.min(100,(1-bestDist/threshold)*100)))});
    }
  });
  results.sort(function(a,b){return a.distance-b.distance});
  return results;
}

// ── QR Code (QRious loaded in head) ──
function QRCodeReal({value,size=220}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!value||!window.QRious)return;
    new window.QRious({element:ref.current,value,size,level:"M",background:"#ffffff",foreground:C.char,padding:16});
  },[value,size]);
  return <canvas ref={ref} width={size} height={size} style={{borderRadius:12}}/>;
}

function downloadQR(canvasParent,filename){
  const canvas=canvasParent.querySelector("canvas");
  if(!canvas)return;
  const link=document.createElement("a");
  link.download=filename||"snaptrace-qr.png";
  link.href=canvas.toDataURL("image/png");
  link.click();
}

function downloadPhoto(url,name){
  const a=document.createElement("a");
  a.href=url;a.target="_blank";a.rel="noopener";
  a.download=name||"snaptrace-photo.jpg";
  a.click();
}

function Toast({message,type="success",onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3500);return()=>clearTimeout(t)},[onClose]);
  return <div style={{position:"fixed",bottom:24,right:24,zIndex:2000,background:type==="success"?C.ok:type==="error"?C.err:C.gold,color:"#fff",padding:"14px 24px",borderRadius:14,fontSize:14,fontFamily:Fb,fontWeight:600,boxShadow:"0 8px 30px rgba(0,0,0,.15)",animation:"sr .3s ease-out",display:"flex",alignItems:"center",gap:10}}>{type==="success"?<Ic.Chk/>:<Ic.Star/>}{message}</div>;
}

// ── AUTH (Email/Password) ──
function Auth({mode,nav,onAuth}){
  const[name,setName]=useState("");const[email,setEmail]=useState("");const[pw,setPw]=useState("");const[err,setErr]=useState("");const[loading,setLoading]=useState(false);
  var isSignup=mode==="signup";

  var submit=function(){
    setErr("");
    if(isSignup&&!name.trim()){setErr("Name is required");return}
    if(!email.trim()||email.indexOf("@")===-1){setErr("Valid email is required");return}
    if(pw.length<6){setErr("Password must be at least 6 characters");return}
    setLoading(true);
    setTimeout(function(){
      onAuth({id:"u_"+Date.now(),name:isSignup?name.trim():email.split("@")[0],email:email.trim(),avatar:(isSignup?name.trim():email.trim()).slice(0,2).toUpperCase(),subscription:{status:"trial",eventsUsed:0}});
      setLoading(false);
    },1000);
  };

  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:C.cream}}>
    <Crd style={{width:"100%",maxWidth:420,padding:40,animation:"si .5s ease-out"}} hover={false}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{width:64,height:64,borderRadius:20,margin:"0 auto 16px",background:"linear-gradient(135deg,"+C.gold+"15,"+C.rose+"15)",display:"flex",alignItems:"center",justifyContent:"center",color:C.gold}}><Ic.Cam/></div>
        <h1 style={{fontFamily:Fh,fontSize:32,fontWeight:600,marginBottom:4}}>{isSignup?"Create Account":"Welcome Back"}</h1>
        <p style={{color:C.gray,fontSize:14}}>{isSignup?"Start your free trial today":"Sign in to your account"}</p>
      </div>

      {err&&<div style={{background:"#FEE8E8",color:C.err,padding:"10px 14px",borderRadius:10,fontSize:13,marginBottom:16,fontWeight:500}}>{err}</div>}

      {isSignup&&<Inp label="Full Name" value={name} onChange={function(e){setName(e.target.value)}} placeholder="Your name"/>}
      <Inp label="Email" type="email" value={email} onChange={function(e){setEmail(e.target.value)}} placeholder="you@email.com"/>
      <Inp label="Password" type="password" value={pw} onChange={function(e){setPw(e.target.value)}} placeholder="Min 6 characters"/>

      <Btn style={{width:"100%"}} size="lg" onClick={submit} loading={loading}>{isSignup?"Create Free Account":"Sign In"}</Btn>

      <p style={{textAlign:"center",marginTop:20,fontSize:14,color:C.gray}}>
        {isSignup?"Already have an account? ":"Don't have an account? "}
        <span style={{color:C.gold,cursor:"pointer",fontWeight:600}} onClick={function(){nav(isSignup?"login":"signup")}}>{isSignup?"Sign In":"Sign Up"}</span>
      </p>
    </Crd>
  </div>;
}

// ── EVENT PAGE ──
function EvtPage({event:ev,events,setEvents,nav,toast}){
  const[uploading,setUploading]=useState(false);const[prog,setProg]=useState(0);const[showQR,setShowQR]=useState(false);const[lb,setLb]=useState(null);const[drag,setDrag]=useState(false);const[copied,setCopied]=useState(false);const fRef=useRef(null);const qrRef=useRef(null);
  const galleryUrl=`${location.origin}${location.pathname}#gallery/${ev?.qrCode||"demo"}`;

  const[modelStatus,setModelStatus]=useState("");
  const[aiReady,setAiReady]=useState(faceModelsLoaded);

  // Preload face models when event page opens
  useEffect(function(){
    if(faceModelsLoaded){setAiReady(true);return}
    loadFaceModels(function(msg){console.log("SnapTrace preload:",msg)}).then(function(ok){
      setAiReady(ok);
      if(ok)console.log("SnapTrace: Models preloaded and ready");
    });
  },[]);

  function readFileAsDataUrl(file){
    return new Promise(function(resolve,reject){
      var reader=new FileReader();
      reader.onload=function(e){resolve(e.target.result)};
      reader.onerror=function(){reject(new Error("Read failed"))};
      reader.readAsDataURL(file);
    });
  }

  function processOneFile(file,index,total,modelsOk){
    setModelStatus("Reading photo "+(index+1)+" of "+total+"...");
    setProg(Math.round((index/total)*50));
    return readFileAsDataUrl(file).then(function(dataUrl){
      if(!modelsOk){
        return{id:"ph_"+Date.now()+"_"+Math.random().toString(36).slice(2),url:dataUrl,faces:0,faceData:[],name:file.name,size:file.size};
      }
      setModelStatus("Detecting faces in photo "+(index+1)+" of "+total+"...");
      setProg(Math.round((index/total)*50+25));
      return loadImage(dataUrl).then(function(img){
        return detectFacesInImage(img);
      }).then(function(faceData){
        setProg(Math.round(((index+1)/total)*90));
        return{id:"ph_"+Date.now()+"_"+Math.random().toString(36).slice(2),url:dataUrl,faces:faceData.length,faceData:faceData,name:file.name,size:file.size};
      }).catch(function(err){
        console.warn("SnapTrace: Face detection failed for",file.name,err);
        return{id:"ph_"+Date.now()+"_"+Math.random().toString(36).slice(2),url:dataUrl,faces:0,faceData:[],name:file.name,size:file.size};
      });
    });
  }

  function processFiles(files){
    if(!files||files.length===0)return;
    var fileList=Array.from(files).filter(function(f){return f.type.startsWith("image/")});
    if(fileList.length===0){toast("Please select image files","error");return}
    setUploading(true);setProg(0);setModelStatus("Loading AI face models...");

    loadFaceModels(function(msg){setModelStatus(msg)}).then(function(modelsOk){
      if(!modelsOk){
        setModelStatus("AI models unavailable. Uploading without face detection...");
      }
      var total=fileList.length;
      // Process files sequentially using promise chain
      var chain=Promise.resolve([]);
      fileList.forEach(function(file,i){
        chain=chain.then(function(results){
          return processOneFile(file,i,total,modelsOk).then(function(photo){
            results.push(photo);
            return results;
          });
        });
      });
      return chain;
    }).then(function(newPhotos){
      setProg(100);setModelStatus("");
      setEvents(function(prev){return prev.map(function(evt){
        if(evt.id===ev.id){return Object.assign({},evt,{photos:evt.photos.concat(newPhotos)})}
        return evt;
      })});
      setUploading(false);setProg(0);
      var totalFaces=newPhotos.reduce(function(s,p){return s+p.faces},0);
      toast(newPhotos.length+" photo"+(newPhotos.length>1?"s":"")+" uploaded, "+totalFaces+" face"+(totalFaces!==1?"s":"")+" detected!","success");
    }).catch(function(err){
      console.error("SnapTrace: Upload processing error:",err);
      setUploading(false);setProg(0);setModelStatus("");
      toast("Error processing photos: "+err.message,"error");
    });
  }

  function handleFileInput(e){
    processFiles(e.target.files);
    if(fRef.current)fRef.current.value="";
  }

  function handleDrop(e){
    e.preventDefault();setDrag(false);
    processFiles(e.dataTransfer.files);
  }

  var del=function(pid){setEvents(function(p){return p.map(function(e){return e.id===ev.id?Object.assign({},e,{photos:e.photos.filter(function(p){return p.id!==pid})}):e})});toast("Photo deleted","info")};
  var copyUrl=function(){navigator.clipboard&&navigator.clipboard.writeText(galleryUrl).then(function(){toast("Link copied!","success")}).catch(function(){});setCopied(true);setTimeout(function(){setCopied(false)},2000)};

  if(!ev)return <div style={{padding:40,textAlign:"center"}}><h2 style={{fontFamily:Fh,fontSize:24}}>Event not found</h2><Btn onClick={()=>nav("dashboard")} style={{marginTop:20}}>Back to Dashboard</Btn></div>;

  return <div style={{minHeight:"100vh",background:C.cream}}>
    <header style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px clamp(16px,3vw,32px)",background:C.white+"E0",backdropFilter:"blur(16px)",borderBottom:`1px solid ${C.creamDk}`,position:"sticky",top:0,zIndex:100}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}><button onClick={()=>nav("dashboard")} style={{background:"none",border:"none",cursor:"pointer",color:C.gray,display:"flex"}}><Ic.Bk/></button><div><h1 style={{fontFamily:Fh,fontSize:"clamp(16px,3vw,22px)",fontWeight:600,lineHeight:1.2}}>{ev.name}</h1><span style={{fontSize:12,color:C.gray}}>{new Date(ev.date).toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"})}</span></div></div>

// ── GUEST GALLERY ──
function Gallery({event:ev,nav,toast}){
  const[lb,setLb]=useState(null);const[lbi,setLbi]=useState(0);
  const[showFind,setShowFind]=useState(false);
  const[step,setStep]=useState("pick");
  const[selfie,setSelfie]=useState(null);
  const[results,setResults]=useState(null);
  const[prog,setProg]=useState(0);
  const camRef=useRef(null);
  const upRef=useRef(null);

  var photos=ev?ev.photos:PHOTOS;
  var eName=ev?ev.name:"Priya & Arjun's Wedding";

  function onFile(e){
    var f=e.target.files&&e.target.files[0];
    if(!f)return;
    var r=new FileReader();
    r.onload=function(x){setSelfie(x.target.result);setStep("analyzing")};
    r.readAsDataURL(f);
  }

  const[modelMsg,setModelMsg]=useState("");
  const[matchConfidences,setMatchConfidences]=useState({});
  const cancelRef=useRef(false);

  // Analyzing step: load models, detect face in selfie
  useEffect(function(){
    if(step!=="analyzing"||!selfie)return;
    cancelRef.current=false;
    setModelMsg("Loading AI face models...");

    loadFaceModels(function(msg){if(!cancelRef.current)setModelMsg(msg)})
    .then(function(ok){
      if(cancelRef.current)return;
      if(!ok){
        setModelMsg("AI models failed to load. Check console for errors.");
        setTimeout(function(){if(!cancelRef.current){setStep("pick");setSelfie(null)}},3000);
        return;
      }
      setModelMsg("Detecting your face...");
      return loadImage(selfie).then(function(img){
        return detectFacesInImage(img);
      });
    })
    .then(function(faces){
      if(cancelRef.current||!faces)return;
      if(faces.length===0){
        setModelMsg("No face detected. Try a clearer, well-lit photo with your face visible.");
        setTimeout(function(){if(!cancelRef.current){setStep("pick");setSelfie(null)}},3000);
        return;
      }
      window.__snapSelfieDescriptors=faces.map(function(f){return f.descriptor});
      window.__snapSelfieFaceCount=faces.length;
      setModelMsg(faces.length+" face"+(faces.length>1?"s":"")+" detected!");
      setTimeout(function(){if(!cancelRef.current){setStep("matching");setProg(0)}},1200);
    })
    .catch(function(err){
      console.error("SnapTrace: Face analysis error:",err);
      if(!cancelRef.current){
        setModelMsg("Face detection failed: "+err.message);
        setTimeout(function(){setStep("pick");setSelfie(null)},3000);
      }
    });

    return function(){cancelRef.current=true};
  },[step,selfie]);

  // Matching step: compare selfie against all event photos
  useEffect(function(){
    if(step!=="matching")return;
    cancelRef.current=false;
    var selfieDescs=window.__snapSelfieDescriptors||[];
    if(selfieDescs.length===0){setStep("pick");return}

    // Check if photos already have face descriptor data
    var photosWithFaceData=photos.filter(function(p){return p.faceData&&p.faceData.length>0});

    function finishMatching(photosToMatch){
      if(cancelRef.current)return;
      setProg(85);setModelMsg("Matching your face against "+photosToMatch.length+" photos...");

      // Use relaxed threshold (0.6) for better recall
      var matched=matchFaces(selfieDescs,photosToMatch,0.6);
      setProg(100);

      var confMap={};
      var matchedPhotos=matched.map(function(m){confMap[m.photo.id]=m.confidence;return m.photo});
      setMatchConfidences(confMap);

      setTimeout(function(){
        if(cancelRef.current)return;
        if(matchedPhotos.length===0){
          setModelMsg("No matching photos found. Try a different, clearer selfie.");
          setTimeout(function(){if(!cancelRef.current){setStep("pick");setSelfie(null)}},3000);
          return;
        }
        setResults(matchedPhotos);setStep("done");setModelMsg("");
      },500);
    }

    if(photosWithFaceData.length>0){
      // Photos already have face data from upload - match directly
      setModelMsg("Matching against "+photosWithFaceData.length+" photos with face data...");
      setProg(50);
      finishMatching(photosWithFaceData);
    }else{
      // No pre-computed face data - scan photos on the fly
      setModelMsg("Scanning event photos for faces...");
      var scannedResults=[];
      var scanChain=Promise.resolve();
      photos.forEach(function(photo,i){
        scanChain=scanChain.then(function(){
          if(cancelRef.current)return;
          setProg(Math.round((i/photos.length)*75));
          setModelMsg("Scanning photo "+(i+1)+" of "+photos.length+" for faces...");
          return loadImage(photo.url).then(function(img){
            return detectFacesInImage(img);
          }).then(function(faces){
            if(faces.length>0){
              scannedResults.push(Object.assign({},photo,{faceData:faces,faces:faces.length}));
            }
          }).catch(function(err){
            console.warn("SnapTrace: Scan failed for photo "+(i+1)+":",err.message);
          });
        });
      });
      scanChain.then(function(){
        if(cancelRef.current)return;
        console.log("SnapTrace: Scanned "+photos.length+" photos, found faces in "+scannedResults.length);
        finishMatching(scannedResults);
      }).catch(function(err){
        console.error("SnapTrace: Matching error:",err);
        if(!cancelRef.current){
          setModelMsg("Error during matching: "+err.message);
          setTimeout(function(){setStep("pick");setSelfie(null)},3000);
        }
      });
    }

    return function(){cancelRef.current=true};
  },[step]);

  function reset(){setShowFind(false);setStep("pick");setSelfie(null);setResults(null);setProg(0);setModelMsg("");setMatchConfidences({})}

  var openLb=function(p,i){setLb(p);setLbi(i)};
  var navLb=function(d){var l=results||photos,n=(lbi+d+l.length)%l.length;setLbi(n);setLb(l[n])};

  return <div style={{minHeight:"100vh",background:C.cream}}>
    <div style={{background:"linear-gradient(135deg,"+C.gold+"15,"+C.rose+"10)",padding:"48px 24px",textAlign:"center",borderBottom:"1px solid "+C.creamDk}}>
      <div style={{animation:"fu .6s ease-out"}}>
        <div style={{color:C.gold,marginBottom:8,display:"flex",justifyContent:"center",gap:4}}><Ic.Hrt/><Ic.Hrt/><Ic.Hrt/></div>
        <h1 style={{fontFamily:Fh,fontSize:"clamp(28px,5vw,46px)",fontWeight:400,marginBottom:8}}>{eName}</h1>
        <p style={{color:C.gray,fontSize:15,marginBottom:24}}>{photos.length} beautiful moments</p>
        <Btn onClick={function(){setShowFind(true);setStep("pick")}} icon={<Ic.Face/>} size="lg">Find My Photos</Btn>
      </div>
    </div>

    <div style={{maxWidth:1200,margin:"0 auto",padding:"32px 16px"}}>
      {results&&<div style={{marginBottom:24,animation:"fu .4s"}}>
        <Crd hover={false} style={{background:"linear-gradient(135deg,"+C.gold+"10,"+C.rose+"10)",border:"1px solid "+C.gold+"30",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12,padding:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{color:C.gold}}><Ic.Face/></div>
            <div><span style={{fontWeight:600,fontSize:15}}>Found {results.length} photos of you!</span><br/><span style={{fontSize:12,color:C.gray}}>AI face recognition match complete</span></div>
          </div>
          <Btn variant="ghost" size="sm" onClick={function(){setResults(null)}}>Show All</Btn>
        </Crd>
      </div>}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}}>
        {(results||photos).map(function(p,i){
          return <div key={p.id+"_"+i} style={{position:"relative",borderRadius:12,overflow:"hidden",aspectRatio:i%5===0?"1":"4/3",cursor:"pointer",animation:"fu .4s ease-out "+(i*0.04)+"s both"}} onClick={function(){openLb(p,i)}}>
            <img src={p.url} alt="" style={{width:"100%",height:"100%",objectFit:"cover",transition:"transform .5s"}} onMouseEnter={function(e){e.target.style.transform="scale(1.06)"}} onMouseLeave={function(e){e.target.style.transform="scale(1)"}}/>
            {results&&<div style={{position:"absolute",top:8,right:8,background:C.gold,color:"#fff",borderRadius:8,padding:"3px 8px",fontSize:10,fontWeight:700}}>{matchConfidences[p.id]||"--"}%</div>}
          </div>;
        })}
      </div>
    </div>

    {/* FIND MY PHOTOS */}
    <Mod isOpen={showFind} onClose={reset} title="Find My Photos" width={440}>

      {step==="pick"&&<div style={{textAlign:"center"}}>
        <div style={{width:140,height:140,borderRadius:"50%",border:"3px dashed "+C.gold+"50",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",background:"radial-gradient(circle,"+C.gold+"08,transparent)"}}>
          <div style={{color:C.gold,marginBottom:6}}><Ic.Face/></div>
          <span style={{fontSize:12,color:C.gray}}>Your Selfie</span>
        </div>
        <p style={{color:C.gray,fontSize:14,marginBottom:20,lineHeight:1.6}}>{ev?"Take a selfie or upload a face photo. AI will find every photo you appear in.":"Upload photos to a real event first, then use Find My Photos with a selfie of someone in those photos."}</p>

        {/* Hidden file inputs */}
        <input ref={camRef} type="file" accept="image/*" capture="user" style={{display:"none"}} onChange={onFile}/>
        <input ref={upRef} type="file" accept="image/*" style={{display:"none"}} onChange={onFile}/>

        <div style={{display:"flex",gap:10,marginBottom:12}}>
          <Btn onClick={function(){camRef.current.click()}} style={{flex:1}} icon={<Ic.Cam/>}>Take Selfie</Btn>
          <Btn variant="secondary" onClick={function(){upRef.current.click()}} style={{flex:1}} icon={<Ic.Up/>}>Upload</Btn>
        </div>
        <p style={{fontSize:11,color:C.gray,opacity:0.5,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}><Ic.Shield/> Processed on your device only</p>
      </div>}

      {step==="analyzing"&&selfie&&<div style={{textAlign:"center",padding:"10px 0"}}>
        <div style={{width:200,height:200,borderRadius:20,overflow:"hidden",margin:"0 auto 16px",position:"relative",border:"3px solid "+C.gold}}>
          <img src={selfie} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
        </div>
        <Spin size={24}/>
        <p style={{color:C.gold,fontSize:14,fontWeight:600,marginTop:12}}>{modelMsg||"Analyzing..."}</p>
      </div>}

      {step==="matching"&&<div style={{textAlign:"center",padding:"10px 0"}}>
        <div style={{display:"flex",gap:12,justifyContent:"center",alignItems:"center",marginBottom:20}}>
          {selfie&&<div style={{width:56,height:56,borderRadius:12,overflow:"hidden",border:"2px solid "+C.gold}}><img src={selfie} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
          <div style={{fontSize:18,color:C.gold}}>→</div>
          <div style={{width:56,height:56,borderRadius:12,overflow:"hidden",border:"2px solid "+C.creamDk,display:"grid",gridTemplateColumns:"1fr 1fr",gap:1}}>
            {photos.slice(0,4).map(function(p,i){return <img key={i} src={p.url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>})}
          </div>
        </div>
        <h3 style={{fontFamily:Fh,fontSize:22,marginBottom:6}}>AI Face Matching</h3>
        <p style={{color:C.gray,fontSize:14}}>{modelMsg||("Scanning "+photos.length+" photos...")}</p>
        <div style={{fontSize:32,fontFamily:Fh,fontWeight:700,color:C.gold,margin:"12px 0"}}>{prog}%</div>
        <div style={{width:220,height:6,background:C.creamDk,borderRadius:3,margin:"0 auto",overflow:"hidden"}}>
          <div style={{width:prog+"%",height:"100%",borderRadius:3,background:"linear-gradient(90deg,"+C.gold+","+C.rose+")",transition:"width .1s"}}/>
        </div>
      </div>}

      {step==="done"&&results&&<div style={{textAlign:"center",padding:"10px 0"}}>
        <div style={{fontSize:48,marginBottom:12}}>🎉</div>
        <h3 style={{fontFamily:Fh,fontSize:26,marginBottom:4}}>Found {results.length} Photos!</h3>
        <p style={{color:C.gray,fontSize:14,marginBottom:4}}>AI matched your face in {results.length} of {photos.length} photos</p>
        {results.length>0&&<p style={{color:C.ok,fontSize:12,marginBottom:16}}>Best match: {Math.max.apply(null,Object.values(matchConfidences).concat([0]))}% confidence</p>}
        <div style={{display:"flex",gap:5,justifyContent:"center",marginBottom:20,flexWrap:"wrap"}}>

          {results.length>6&&<div style={{width:44,height:44,borderRadius:8,background:C.creamDk,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:600,color:C.gray}}>+{results.length-6}</div>}

        <p style={{marginTop:12}}><span style={{color:C.gold,cursor:"pointer",fontSize:13}} onClick={function(){setStep("pick");setSelfie(null)}}>Try different photo</span></p>

    {/* Lightbox */}

// ── STORAGE HELPERS ──
function saveEvents(events){
  try{
    // Store event metadata separately from photo data to handle large photos
    var meta=events.map(function(e){return Object.assign({},e,{photoCount:e.photos.length,photos:[]})});
    localStorage.setItem("st_events",JSON.stringify(meta));
    // Store photos per event (including face descriptor data for AI matching)
    events.forEach(function(e){
      try{localStorage.setItem("st_photos_"+e.id,JSON.stringify(e.photos))}catch(err){
        // If storage is full, try saving without face data as fallback
        try{
          var slimPhotos=e.photos.map(function(p){return Object.assign({},p,{faceData:undefined})});
          localStorage.setItem("st_photos_"+e.id,JSON.stringify(slimPhotos));
          console.warn("Storage full for event "+e.id+", saved without face descriptors");
        }catch(err2){console.warn("Storage full for event "+e.id)}
      }
    });
  }catch(e){console.warn("localStorage save error:",e)}
}

function loadEvents(){
  try{
    var raw=localStorage.getItem("st_events");
    if(!raw)return[];
    var meta=JSON.parse(raw);
    return meta.map(function(e){
      var photosRaw=localStorage.getItem("st_photos_"+e.id);
      var photos=photosRaw?JSON.parse(photosRaw):(e.photos||[]);
      return Object.assign({},e,{photos:photos});
    });
  }catch(e){return[]}
}

function saveUser(user){
  try{if(user)localStorage.setItem("st_user",JSON.stringify(user));else localStorage.removeItem("st_user")}catch(e){}
}

function loadUser(){
  try{var raw=localStorage.getItem("st_user");return raw?JSON.parse(raw):null}catch(e){return null}
}

// ── APP ──
function App(){
  const[page,setPage]=useState("landing");
  const[user,setUser]=useState(function(){return loadUser()});
  const[events,setEvents]=useState(function(){return loadEvents()});
  const[aEvt,setAEvt]=useState(null);
  const[aQr,setAQr]=useState(null);
  const[t,setT]=useState(null);

  // Persist events to localStorage whenever they change
  useEffect(function(){saveEvents(events)},[events]);
  // Persist user
  useEffect(function(){saveUser(user)},[user]);

  // Auto-login if user exists in storage
  useEffect(function(){if(user&&page==="landing")setPage("dashboard")},[]);

  // Hash routing for QR code scanning AND admin
  var handleHash=useCallback(function(){
    var h=location.hash;
    if(h.startsWith("#gallery/")){setAQr(h.replace("#gallery/",""));setPage("gallery")}
    else if(h==="#admin"){setPage("admin")}
  },[]);
  useEffect(function(){handleHash();window.addEventListener("hashchange",handleHash);return function(){window.removeEventListener("hashchange",handleHash)}},[handleHash]);

  var nav=useCallback(function(to,p){
    if(to==="event"){setAEvt(p);setPage("event");history.replaceState(null,"",location.pathname)}
    else if(to==="gallery"){setAQr(p);setPage("gallery");location.hash="gallery/"+p}
    else if(to==="gallery-demo"){setAQr("demo");setPage("gallery");location.hash="gallery/demo"}
    else if(to==="admin"){setPage("admin");location.hash="admin"}
    else{setPage(to);history.replaceState(null,"",location.pathname)}
    window.scrollTo(0,0);
  },[]);

  var toast=useCallback(function(m,ty){setT({message:m,type:ty})},[]);

  // Track signups
  var auth=function(u){
    setUser(u);
    try{
      var signups=JSON.parse(localStorage.getItem("st_signups")||"[]");
      if(!signups.find(function(s){return s.email===u.email})){
        signups.push({name:u.name,email:u.email,date:new Date().toISOString()});
        localStorage.setItem("st_signups",JSON.stringify(signups));
      }
    }catch(e){}
    nav("dashboard");toast("Welcome, "+u.name+"!","success");
  };
  var logout=function(){setUser(null);nav("landing");toast("Signed out","info")};

  var active=events.find(function(e){return e.id===aEvt});
  if(!active&&aQr){
    active=events.find(function(e){return e.qrCode===aQr});
    if(!active){var stored=loadEvents();active=stored.find(function(e){return e.qrCode===aQr})}
  }

  return React.createElement(React.Fragment,null,
    React.createElement(Particles,null),
    React.createElement("div",{style:{position:"relative",zIndex:1}},
      page==="landing"&&React.createElement(Landing,{nav:nav}),
      page==="signup"&&React.createElement(Auth,{mode:"signup",nav:nav,onAuth:auth}),
      page==="login"&&React.createElement(Auth,{mode:"login",nav:nav,onAuth:auth}),
      page==="dashboard"&&user&&React.createElement(Dash,{user:user,setUser:setUser,nav:nav,logout:logout,events:events,setEvents:setEvents,toast:toast}),
      page==="event"&&user&&React.createElement(EvtPage,{event:active,events:events,setEvents:setEvents,nav:nav,toast:toast}),
      page==="gallery"&&React.createElement(Gallery,{event:active,nav:nav,toast:toast}),
      page==="admin"&&React.createElement(AdminPanel,{nav:nav,events:events})
    ),
    t&&React.createElement(Toast,{message:t.message,type:t.type,onClose:function(){setT(null)}})
  );
}

// ── ADMIN PANEL ──
function AdminPanel({nav,events}){
  const[signups,setSignups]=useState([]);
  const[pin,setPin]=useState("");
  const[unlocked,setUnlocked]=useState(false);
  var ADMIN_PIN="2024";

  useEffect(function(){
    try{setSignups(JSON.parse(localStorage.getItem("st_signups")||"[]"))}catch(e){}
  },[]);

  if(!unlocked){
    return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:C.cream}}>
      <Crd style={{width:"100%",maxWidth:380,padding:40,animation:"si .5s ease-out"}} hover={false}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{color:C.gold,marginBottom:8}}><Ic.Shield/></div>
          <h2 style={{fontFamily:Fh,fontSize:28,fontWeight:600}}>Admin Access</h2>
          <p style={{color:C.gray,fontSize:14,marginTop:4}}>Enter your admin PIN</p>
        </div>
        <Inp label="PIN" type="password" value={pin} onChange={function(e){setPin(e.target.value)}} placeholder="Enter PIN"/>
        <Btn style={{width:"100%"}} size="lg" onClick={function(){if(pin===ADMIN_PIN){setUnlocked(true)}else{setPin("")}}}>Unlock</Btn>
        <p style={{textAlign:"center",marginTop:16}}><span style={{color:C.gold,cursor:"pointer",fontSize:14}} onClick={function(){nav("landing")}}>Back to home</span></p>
      </Crd>
    </div>;
  }

  var totalPhotos=events.reduce(function(s,e){return s+e.photos.length},0);
  var totalFaces=events.reduce(function(s,e){return s+e.photos.reduce(function(s2,p){return s2+(p.faces||0)},0)},0);

  return <div style={{minHeight:"100vh",background:C.cream}}>
    <header style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px clamp(16px,3vw,32px)",background:C.white+"E0",backdropFilter:"blur(16px)",borderBottom:"1px solid "+C.creamDk,position:"sticky",top:0,zIndex:100}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <button onClick={function(){nav("landing")}} style={{background:"none",border:"none",cursor:"pointer",color:C.gray,display:"flex"}}><Ic.Bk/></button>
        <h1 style={{fontFamily:Fh,fontSize:22,fontWeight:600}}>Admin Dashboard</h1>
      </div>
      <Bdg variant="premium"><Ic.Shield/> Admin</Bdg>
    </header>
    <div style={{maxWidth:1000,margin:"0 auto",padding:"32px clamp(16px,3vw,24px)"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:16,marginBottom:32}}>
        {[{l:"Signups",v:signups.length,clr:C.gold},{l:"Events",v:events.length,clr:C.rose},{l:"Photos",v:totalPhotos,clr:C.ok},{l:"Faces",v:totalFaces,clr:"#6366f1"}].map(function(s,i){
          return <Crd key={i} style={{padding:20,animationDelay:i*0.1+"s"}} hover={false}>
            <div style={{fontSize:11,color:C.gray,letterSpacing:".08em",textTransform:"uppercase",marginBottom:6}}>{s.l}</div>
            <div style={{fontSize:32,fontFamily:Fh,fontWeight:700,color:s.clr}}>{s.v}</div>
          </Crd>;
        })}
      </div>

      <h2 style={{fontFamily:Fh,fontSize:24,fontWeight:500,marginBottom:16}}>All Signups ({signups.length})</h2>
      {signups.length===0?<Crd hover={false}><p style={{color:C.gray,textAlign:"center",padding:20}}>No signups yet.</p></Crd>:
        <Crd hover={false} style={{padding:0,overflow:"hidden"}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:14,fontFamily:Fb}}>
              <thead><tr style={{background:C.creamDk}}>
                <th style={{padding:"12px 16px",textAlign:"left",fontWeight:600,color:C.gray,fontSize:11,letterSpacing:".05em",textTransform:"uppercase"}}>#</th>
                <th style={{padding:"12px 16px",textAlign:"left",fontWeight:600,color:C.gray,fontSize:11,letterSpacing:".05em",textTransform:"uppercase"}}>Name</th>
                <th style={{padding:"12px 16px",textAlign:"left",fontWeight:600,color:C.gray,fontSize:11,letterSpacing:".05em",textTransform:"uppercase"}}>Email</th>
                <th style={{padding:"12px 16px",textAlign:"left",fontWeight:600,color:C.gray,fontSize:11,letterSpacing:".05em",textTransform:"uppercase"}}>Date</th>
              </tr></thead>
              <tbody>{signups.map(function(s,i){
                var d=new Date(s.date);
                return <tr key={i} style={{borderBottom:"1px solid "+C.creamDk}}>
                  <td style={{padding:"12px 16px",color:C.gray}}>{i+1}</td>
                  <td style={{padding:"12px 16px"}}><div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:30,height:30,borderRadius:8,background:"linear-gradient(135deg,"+C.gold+","+C.rose+")",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10,fontWeight:700}}>{(s.name||"?").slice(0,2).toUpperCase()}</div>
                    <span style={{fontWeight:600}}>{s.name}</span></div></td>
                  <td style={{padding:"12px 16px",color:C.gray}}>{s.email}</td>
                  <td style={{padding:"12px 16px",color:C.gray,fontSize:12}}>{d.toLocaleDateString("en-IN",{day:"numeric",month:"short"})+" "+d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})}</td>
                </tr>;
              })}</tbody>
            </table>
          </div>
        </Crd>
      }

      <h2 style={{fontFamily:Fh,fontSize:24,fontWeight:500,marginTop:32,marginBottom:16}}>All Events ({events.length})</h2>
      {events.length===0?<Crd hover={false}><p style={{color:C.gray,textAlign:"center",padding:20}}>No events yet.</p></Crd>:
        <Crd hover={false} style={{padding:0,overflow:"hidden"}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:14,fontFamily:Fb}}>
              <thead><tr style={{background:C.creamDk}}>
                <th style={{padding:"12px 16px",textAlign:"left",fontWeight:600,color:C.gray,fontSize:11,letterSpacing:".05em",textTransform:"uppercase"}}>#</th>
                <th style={{padding:"12px 16px",textAlign:"left",fontWeight:600,color:C.gray,fontSize:11,letterSpacing:".05em",textTransform:"uppercase"}}>Event</th>
                <th style={{padding:"12px 16px",textAlign:"left",fontWeight:600,color:C.gray,fontSize:11,letterSpacing:".05em",textTransform:"uppercase"}}>Date</th>
                <th style={{padding:"12px 16px",textAlign:"left",fontWeight:600,color:C.gray,fontSize:11,letterSpacing:".05em",textTransform:"uppercase"}}>Photos</th>
              </tr></thead>
              <tbody>{events.map(function(ev,i){
                return <tr key={i} style={{borderBottom:"1px solid "+C.creamDk}}>
                  <td style={{padding:"12px 16px",color:C.gray}}>{i+1}</td>
                  <td style={{padding:"12px 16px",fontWeight:600}}>{ev.name}</td>
                  <td style={{padding:"12px 16px",color:C.gray,fontSize:12}}>{new Date(ev.date).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})}</td>
                  <td style={{padding:"12px 16px"}}><Bdg variant={ev.photos.length>0?"success":"default"}>{ev.photos.length}</Bdg></td>
                </tr>;
              })}</tbody>
            </table>
          </div>
        </Crd>
      }

      <div style={{marginTop:32,display:"flex",gap:12,flexWrap:"wrap"}}>
        <Btn variant="secondary" size="sm" onClick={function(){
          var csv="Name,Email,Date\n"+signups.map(function(s){return s.name+","+s.email+","+s.date}).join("\n");
          var b=new Blob([csv],{type:"text/csv"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="snaptrace-signups.csv";a.click();
        }} icon={<Ic.Dl/>}>Export CSV</Btn>
        <Btn variant="ghost" size="sm" onClick={function(){
          if(confirm("Clear all signup data?")){localStorage.removeItem("st_signups");setSignups([])}
        }} icon={<Ic.Del/>}>Clear Data</Btn>
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
