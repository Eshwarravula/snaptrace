<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--cream:#FAF8F3;--cream-dk:#F0EDE6;--gold:#D4A574;--gold-lt:#E8C9A0;--rose:#C9956D;--char:#2C2C2C;--gray:#6B6560;--white:#FEFDFB;--blush:#F5E6DA;--err:#C44B4B;--ok:#5A8F5A;--fh:'Cormorant Garamond','Playfair Display',Georgia,serif;--fb:'Lora','Crimson Text',Georgia,serif;--fm:'JetBrains Mono',monospace}
body{background:var(--cream);color:var(--char);font-family:var(--fb)}
@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes si{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes pb{from{width:0}to{width:100%}}
@keyframes fp{0%,100%{transform:translateY(0) translateX(0);opacity:.4}33%{transform:translateY(-25px) translateX(12px);opacity:.7}66%{transform:translateY(-8px) translateX(-8px);opacity:.5}}
@keyframes sr{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--cream-dk)}::-webkit-scrollbar-thumb{background:var(--gold-lt);border-radius:3px}
</style>

const Ic={

Usr:()=><svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
Hrt:()=><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>,
Sch:()=><svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>,
Dl:()=><svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>,

Chk:()=><svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>,
Chv:()=><svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>,

Grid:()=><svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>,

Img:()=><svg width="48" height="48" fill="none" stroke="currentColor" strokeWidth="1" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>,
Shield:()=><svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
Zap:()=><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
Goo:()=><svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>,
Link:()=><svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>,

// ─── QR CODE using QRious (loaded in <head>) ───
function QRCodeReal({value,size=220}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!value||!window.QRious)return;
    new window.QRious({element:ref.current,value,size,level:"L",background:"#ffffff",foreground:C.char,padding:12});
  },[value,size]);
  return <canvas ref={ref} width={size} height={size} style={{borderRadius:12}}/>;
}

// ─── UI Components ───
function Particles(){return <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}>{Array.from({length:10}).map((_,i)=><div key={i} style={{position:"absolute",width:4+Math.random()*6,height:4+Math.random()*6,borderRadius:"50%",background:i%3===0?C.gold+"25":i%3===1?C.rose+"18":C.blush+"35",left:`${Math.random()*100}%`,top:`${Math.random()*100}%`,animation:`fp ${8+Math.random()*12}s ease-in-out infinite`,animationDelay:`${Math.random()*-10}s`}}/>)}</div>}

function Btn({children,variant="primary",size="md",onClick,disabled,style,icon,loading}){
  const bs={display:"inline-flex",alignItems:"center",justifyContent:"center",gap:8,fontFamily:Fb,fontWeight:600,cursor:disabled?"not-allowed":"pointer",border:"none",borderRadius:12,transition:"all .3s cubic-bezier(.4,0,.2,1)",opacity:disabled?.5:1,letterSpacing:".02em"};
  const sz={sm:{padding:"8px 18px",fontSize:13},md:{padding:"12px 28px",fontSize:15},lg:{padding:"16px 36px",fontSize:17}};
  const vs={primary:{background:`linear-gradient(135deg,${C.gold},${C.rose})`,color:"#fff",boxShadow:`0 4px 20px ${C.gold}40`},secondary:{background:"transparent",color:C.gold,border:`2px solid ${C.gold}`},ghost:{background:"transparent",color:C.gray},white:{background:"#fff",color:C.char,boxShadow:"0 2px 12px rgba(0,0,0,.08)"}};
  return <button onClick={onClick} disabled={disabled||loading} style={{...bs,...sz[size],...(vs[variant]||vs.primary),...style}} onMouseEnter={e=>{if(!disabled)e.target.style.transform="translateY(-2px)";}} onMouseLeave={e=>{e.target.style.transform="translateY(0)";}}>
    {loading?<div style={{width:18,height:18,border:"2px solid currentColor",borderTopColor:"transparent",borderRadius:"50%",animation:"sp .7s linear infinite"}}/>:icon}{children}</button>;
}

function Inp({label,type="text",value,onChange,placeholder,error,style,icon}){
  const[f,sf]=useState(false);
  return <div style={{marginBottom:20,...style}}>
    {label&&<label style={{display:"block",marginBottom:6,fontSize:13,fontWeight:600,color:C.gray,letterSpacing:".05em",textTransform:"uppercase"}}>{label}</label>}
    <div style={{position:"relative"}}>
      {icon&&<div style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:f?C.gold:C.gray,transition:"color .2s"}}>{icon}</div>}
      <input type={type} value={value} onChange={onChange} placeholder={placeholder} onFocus={()=>sf(true)} onBlur={()=>sf(false)} style={{width:"100%",padding:icon?"14px 16px 14px 44px":"14px 16px",border:`2px solid ${error?C.err:f?C.gold:C.creamDk}`,borderRadius:12,fontSize:15,fontFamily:Fb,color:C.char,background:C.white,outline:"none",transition:"all .3s",boxShadow:f?`0 0 0 4px ${C.gold}15`:"none"}}/>
    </div>
  </div>;
}

function Crd({children,style,hover=true,onClick,anim=true}){
  const[h,sh]=useState(false);
  return <div onClick={onClick} onMouseEnter={()=>sh(true)} onMouseLeave={()=>sh(false)} style={{background:"#fff",borderRadius:20,padding:28,boxShadow:h&&hover?"0 12px 40px rgba(0,0,0,.1)":"0 2px 16px rgba(0,0,0,.04)",border:`1px solid ${C.creamDk}`,transition:"all .4s cubic-bezier(.4,0,.2,1)",transform:h&&hover?"translateY(-4px)":"none",cursor:onClick?"pointer":"default",animation:anim?"fu .6s ease-out both":"none",...style}}>{children}</div>;
}

function Bdg({children,variant="default",style}){
  const vs={default:{background:C.blush,color:C.rose},success:{background:"#E8F5E8",color:C.ok},warning:{background:"#FFF3E0",color:"#E67E22"},premium:{background:`linear-gradient(135deg,${C.gold}20,${C.rose}20)`,color:C.gold}};
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"4px 12px",borderRadius:20,fontSize:12,fontWeight:600,letterSpacing:".03em",...vs[variant],...style}}>{children}</span>;
}

function Mod({isOpen,onClose,children,title,width=520}){
  if(!isOpen)return null;
  return <div style={{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)",backdropFilter:"blur(8px)"}}/>
    <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:24,padding:32,maxWidth:width,width:"100%",position:"relative",zIndex:1,maxHeight:"90vh",overflowY:"auto",animation:"si .3s ease-out",boxShadow:"0 24px 80px rgba(0,0,0,.2)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
        {title&&<h2 style={{fontFamily:Fh,fontSize:26,fontWeight:600}}>{title}</h2>}
        <button onClick={onClose} style={{background:C.creamDk,border:"none",borderRadius:10,width:36,height:36,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic.X/></button>
      </div>{children}</div></div>;
}

function Spin({size=32}){return <div style={{width:size,height:size,border:`3px solid ${C.creamDk}`,borderTopColor:C.gold,borderRadius:"50%",animation:"sp .8s linear infinite"}}/>}
function Empty({icon,title,desc,action}){return <div style={{textAlign:"center",padding:"60px 20px",animation:"fu .6s ease-out"}}><div style={{color:C.goldLt,marginBottom:16,opacity:.6}}>{icon}</div><h3 style={{fontFamily:Fh,fontSize:24,marginBottom:8}}>{title}</h3><p style={{color:C.gray,fontSize:15,marginBottom:24,maxWidth:360,margin:"0 auto 24px"}}>{desc}</p>{action}</div>}

function Toast({message,type="success",onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3500);return()=>clearTimeout(t)},[onClose]);
  return <div style={{position:"fixed",bottom:24,right:24,zIndex:2000,background:type==="success"?C.ok:type==="error"?C.err:C.gold,color:"#fff",padding:"14px 24px",borderRadius:14,fontSize:14,fontFamily:Fb,fontWeight:600,boxShadow:"0 8px 30px rgba(0,0,0,.15)",animation:"sr .3s ease-out",display:"flex",alignItems:"center",gap:10}}>{type==="success"?<Ic.Chk/>:<Ic.Star/>}{message}</div>;
}

// ─── LANDING ───
function Landing({nav}){
  return <div style={{minHeight:"100vh"}}>
    <nav style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"20px clamp(16px,4vw,40px)",position:"sticky",top:0,background:C.cream+"E0",backdropFilter:"blur(16px)",zIndex:100,borderBottom:`1px solid ${C.creamDk}`}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{color:C.gold}}><Ic.Cam/></div><span style={{fontFamily:Fh,fontSize:24,fontWeight:600}}>SnapTrace</span></div>
      <div style={{display:"flex",gap:12}}><Btn variant="ghost" size="sm" onClick={()=>nav("login")}>Sign In</Btn><Btn size="sm" onClick={()=>nav("login")}>Get Started</Btn></div>
    </nav>
    <section style={{padding:"80px clamp(16px,4vw,40px) 60px",textAlign:"center",background:`radial-gradient(ellipse at 50% 0%,${C.gold}08,transparent 70%)`}}>
      <div style={{animation:"fu .8s ease-out"}}>
        <Bdg variant="premium" style={{marginBottom:20,fontSize:13}}><Ic.Star/> AI-Powered Wedding Photos</Bdg>
        <h1 style={{fontFamily:Fh,fontSize:"clamp(36px,6vw,72px)",fontWeight:300,lineHeight:1.1,maxWidth:800,margin:"0 auto 24px",letterSpacing:"-.02em"}}>Every Moment,<br/><span style={{fontWeight:600,background:`linear-gradient(135deg,${C.gold},${C.rose})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Instantly Found</span></h1>
        <p style={{fontSize:"clamp(15px,2vw,19px)",color:C.gray,maxWidth:560,margin:"0 auto 40px",lineHeight:1.7}}>Upload wedding photos, generate a QR code, and let guests find themselves using AI face recognition.</p>
        <div style={{display:"flex",gap:16,justifyContent:"center",flexWrap:"wrap"}}><Btn size="lg" onClick={()=>nav("login")} icon={<Ic.Cam/>}>Start Free Trial</Btn><Btn variant="secondary" size="lg" onClick={()=>nav("gallery-demo")}>View Demo</Btn></div>
      </div>
      <div style={{marginTop:60,maxWidth:900,margin:"60px auto 0",position:"relative",animation:"fu 1s ease-out .3s both"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,borderRadius:24,overflow:"hidden",boxShadow:"0 24px 80px rgba(0,0,0,.1)",border:`1px solid ${C.creamDk}`}}>{PHOTOS.slice(0,6).map((p,i)=><div key={i} style={{aspectRatio:i===0||i===5?"1":"4/3",overflow:"hidden"}}><img src={p.url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>)}</div>
        <div style={{position:"absolute",bottom:-20,right:-20,background:"#fff",borderRadius:16,padding:"16px 20px",boxShadow:"0 8px 30px rgba(0,0,0,.12)",display:"flex",alignItems:"center",gap:10,animation:"fu 1s ease-out .8s both"}}><div style={{color:C.gold}}><Ic.Face/></div><div style={{textAlign:"left"}}><div style={{fontSize:13,fontWeight:700}}>AI Found 47 Photos</div><div style={{fontSize:11,color:C.gray}}>of you in 2.3 seconds</div></div></div>
      </div>
    </section>
    <section style={{padding:"80px clamp(16px,4vw,40px)",maxWidth:1100,margin:"0 auto"}}>
      <h2 style={{fontFamily:Fh,fontSize:42,textAlign:"center",marginBottom:60,fontWeight:400}}>How It Works</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:32}}>
        {[{icon:<Ic.Up/>,t:"Upload Photos",d:"Drag & drop your wedding photos."},{icon:<Ic.QR/>,t:"Share QR Code",d:"Generate a unique scannable QR."},{icon:<Ic.Face/>,t:"AI Finds Faces",d:"Guests upload a selfie, AI finds them."},{icon:<Ic.Dl/>,t:"Download",d:"Guests download their photos instantly."}].map((s,i)=>
          <Crd key={i} style={{textAlign:"center",animationDelay:`${i*.15}s`}}><div style={{width:56,height:56,borderRadius:16,background:`linear-gradient(135deg,${C.gold}15,${C.rose}15)`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",color:C.gold}}>{s.icon}</div><div style={{fontSize:13,color:C.gold,fontWeight:700,marginBottom:8,letterSpacing:".1em"}}>STEP {i+1}</div><h3 style={{fontFamily:Fh,fontSize:22,marginBottom:8,fontWeight:600}}>{s.t}</h3><p style={{color:C.gray,fontSize:14,lineHeight:1.7}}>{s.d}</p></Crd>
        )}
      </div>
    </section>
    <section style={{padding:"80px clamp(16px,4vw,40px)",background:`linear-gradient(180deg,${C.creamDk}40,${C.cream})`}}>

    <div style={{background:`linear-gradient(135deg,${C.gold}15,${C.rose}10)`,padding:"48px 24px",textAlign:"center",borderBottom:`1px solid ${C.creamDk}`}}>
      <div style={{animation:"fu .6s ease-out"}}><div style={{color:C.gold,marginBottom:8,display:"flex",justifyContent:"center",gap:4}}><Ic.Hrt/><Ic.Hrt/><Ic.Hrt/></div>
        <h1 style={{fontFamily:Fh,fontSize:"clamp(28px,5vw,46px)",fontWeight:400,marginBottom:8}}>{name}</h1>
        <p style={{color:C.gray,fontSize:15,marginBottom:24}}>{photos.length} beautiful moments</p>
        <Btn onClick={()=>setShowFind(true)} icon={<Ic.Face/>} size="lg">Find My Photos</Btn></div>
    </div>
    <div style={{maxWidth:1200,margin:"0 auto",padding:"32px 16px"}}>
      {results&&<div style={{marginBottom:24,animation:"fu .4s"}}><Crd hover={false} style={{background:`linear-gradient(135deg,${C.gold}10,${C.rose}10)`,border:`1px solid ${C.gold}30`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12,padding:20}}><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{color:C.gold}}><Ic.Face/></div><div><span style={{fontWeight:600,fontSize:15}}>Found {results.length} photos of you!</span><span style={{display:"block",fontSize:12,color:C.gray}}>AI matched with high confidence</span></div></div><Btn variant="ghost" size="sm" onClick={()=>setResults(null)}>Show All</Btn></Crd></div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
        {(results||photos).map((p,i)=><div key={p.id+i} style={{position:"relative",borderRadius:12,overflow:"hidden",aspectRatio:i%5===0?"1":"4/3",cursor:"pointer",animation:`fu .4s ease-out ${i*.04}s both`}} onClick={()=>openLb(p,i)}>
          <img src={p.url} alt="" style={{width:"100%",height:"100%",objectFit:"cover",transition:"transform .5s"}} onMouseEnter={e=>e.target.style.transform="scale(1.08)"} onMouseLeave={e=>e.target.style.transform="scale(1)"}/>
          {results&&<div style={{position:"absolute",top:8,right:8,background:C.gold,color:"#fff",borderRadius:8,padding:"3px 8px",fontSize:10,fontWeight:700}}>{(85+Math.random()*14).toFixed(0)}%</div>}
        </div>)}
      </div>
    </div>
    <Mod isOpen={showFind} onClose={()=>{setShowFind(false);setScanning(false)}} title="Find My Photos" width={480}>
      {scanning?<div style={{textAlign:"center",padding:"40px 0"}}><div style={{position:"relative",width:120,height:120,margin:"0 auto 24px"}}><div style={{width:120,height:120,borderRadius:"50%",border:`3px solid ${C.gold}`,borderTopColor:"transparent",animation:"sp 1s linear infinite"}}/><div style={{position:"absolute",inset:10,borderRadius:"50%",background:`linear-gradient(135deg,${C.gold}20,${C.rose}20)`,display:"flex",alignItems:"center",justifyContent:"center",color:C.gold}}><Ic.Face/></div></div><h3 style={{fontFamily:Fh,fontSize:22,marginBottom:8}}>Scanning...</h3><p style={{color:C.gray,fontSize:14}}>Matching against {photos.length} photos</p><div style={{width:200,height:4,background:C.creamDk,borderRadius:2,margin:"16px auto 0",overflow:"hidden"}}><div style={{height:"100%",borderRadius:2,background:`linear-gradient(90deg,${C.gold},${C.rose})`,animation:"pb 2.5s ease-in-out"}}/></div></div>:
      results?<div style={{textAlign:"center",padding:"20px 0"}}><div style={{color:C.gold,marginBottom:12}}><Ic.Star/></div><h3 style={{fontFamily:Fh,fontSize:24,marginBottom:8}}>Found {results.length} Photos!</h3><p style={{color:C.gray,fontSize:14,marginBottom:20}}>You appear in {results.length} of {photos.length} photos</p><Btn onClick={()=>setShowFind(false)}>View My Photos</Btn></div>:
      <div style={{textAlign:"center"}}><div style={{width:160,height:160,borderRadius:"50%",border:`3px dashed ${C.gold}40`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",margin:"0 auto 24px",cursor:"pointer",background:`radial-gradient(circle,${C.gold}08,transparent)`}} onClick={find}><div style={{color:C.gold,marginBottom:8}}><Ic.Usr/></div><span style={{fontSize:13,color:C.gray,fontWeight:500}}>Upload Selfie</span></div><p style={{color:C.gray,fontSize:13,marginBottom:20,lineHeight:1.6}}>Upload a face photo and AI finds every moment you appear in.</p><Btn onClick={find} style={{width:"100%"}} icon={<Ic.Sch/>}>Find Me</Btn><p style={{fontSize:11,color:C.gray,marginTop:12,opacity:.6,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}><Ic.Shield/> Never stored</p></div>}
    </Mod>
    {lb&&<div style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,.92)",display:"flex",alignItems:"center",justifyContent:"center",animation:"fi .2s"}} onClick={()=>setLb(null)}>
      <button onClick={()=>setLb(null)} style={{position:"absolute",top:20,right:20,background:"rgba(255,255,255,.1)",border:"none",borderRadius:12,width:44,height:44,cursor:"pointer",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2}}><Ic.X/></button>
      <button onClick={e=>{e.stopPropagation();navLb(-1)}} style={{position:"absolute",left:20,background:"rgba(255,255,255,.1)",border:"none",borderRadius:12,width:44,height:44,cursor:"pointer",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",transform:"rotate(180deg)"}}><Ic.Chv/></button>
      <img src={lb.url} alt="" style={{maxWidth:"85vw",maxHeight:"85vh",borderRadius:12,boxShadow:"0 24px 80px rgba(0,0,0,.5)",animation:"si .25s"}} onClick={e=>e.stopPropagation()}/>
      <button onClick={e=>{e.stopPropagation();navLb(1)}} style={{position:"absolute",right:20,background:"rgba(255,255,255,.1)",border:"none",borderRadius:12,width:44,height:44,cursor:"pointer",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic.Chv/></button>
      <div style={{position:"absolute",bottom:20,display:"flex",gap:12,alignItems:"center"}}><Btn variant="white" size="sm" icon={<Ic.Dl/>} onClick={e=>{e.stopPropagation();toast("Downloaded!","success")}}>Download</Btn><span style={{color:"rgba(255,255,255,.5)",fontSize:13}}>{lbi+1}/{(results||photos).length}</span></div>
    </div>}
    <footer style={{textAlign:"center",padding:32,borderTop:`1px solid ${C.creamDk}`}}><div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginBottom:8}}><div style={{color:C.gold,transform:"scale(.8)"}}><Ic.Cam/></div><span style={{fontFamily:Fh,fontSize:16,fontWeight:600,color:C.gray}}>Powered by SnapTrace</span></div></footer>
  </div>;
}

// ─── APP ───
function App(){
  const[page,setPage]=useState("landing");const[user,setUser]=useState(null);const[events,setEvents]=useState([]);const[aEvt,setAEvt]=useState(null);const[aQr,setAQr]=useState(null);const[t,setT]=useState(null);
  const handleHash=useCallback(()=>{const h=location.hash;if(h.startsWith("#gallery/")){setAQr(h.replace("#gallery/",""));setPage("gallery")}},[]);
  useEffect(()=>{handleHash();window.addEventListener("hashchange",handleHash);return()=>window.removeEventListener("hashchange",handleHash)},[handleHash]);
  const nav=useCallback((to,p)=>{if(to==="event"){setAEvt(p);setPage("event");location.hash=""}else if(to==="gallery"){setAQr(p);setPage("gallery");location.hash=`gallery/${p}`}else if(to==="gallery-demo"){setAQr("demo");setPage("gallery");location.hash="gallery/demo"}else{setPage(to);location.hash=""}window.scrollTo(0,0)},[]);
  const toast=useCallback((m,ty)=>setT({message:m,type:ty}),[]);
  const auth=(u)=>{setUser(u);nav("dashboard");toast(`Welcome, ${u.name}!`,"success")};
  const logout=()=>{setUser(null);setEvents([]);nav("landing");toast("Signed out","info")};
  const active=events.find(e=>e.id===aEvt)||(aQr?events.find(e=>e.qrCode===aQr):null);
  return <>
    <Particles/>
    <div style={{position:"relative",zIndex:1}}>
      {page==="landing"&&<Landing nav={nav}/>}
      {page==="login"&&<Login nav={nav} onAuth={auth}/>}
      {page==="dashboard"&&user&&<Dash user={user} nav={nav} logout={logout} events={events} setEvents={setEvents} toast={toast}/>}
      {page==="event"&&user&&<EvtPage event={active} events={events} setEvents={setEvents} nav={nav} user={user} toast={toast}/>}
      {page==="gallery"&&<Gallery event={active} nav={nav} toast={toast}/>}
    </div>
    {t&&<Toast message={t.message} type={t.type} onClose={()=>setT(null)}/>}
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
